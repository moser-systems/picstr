# Spring Security OAuth2 / OpenID Connect Configuration Example
# This file demonstrates how to configure Microsoft Entra ID (formerly Azure AD) as an OIDC provider
#
# Usage:
# 1. Rename this file to application-oidc-microsoft.properties (or use any profile name)
# 2. Configure your Microsoft Entra ID application (see instructions below)
# 3. Fill in the client-id and client-secret values
# 4. Run the application with: spring.profiles.active=oidc-microsoft
#
# Or in Docker:
# -e SPRING_PROFILES_ACTIVE=oidc-microsoft
# OR in docker-compose:
# environment:
#   SPRING_PROFILES_ACTIVE: oidc-microsoft

# ============================================================================
# MICROSOFT ENTRA ID (OIDC) CONFIGURATION
# ============================================================================

# Client ID from your Microsoft Entra ID application registration
# Get this from: https://portal.azure.com > App registrations > Your App > Application (client) ID
spring.security.oauth2.client.registration.microsoft.client-id=${OIDC_CLIENT_ID:your-client-id}

# Client Secret from your Microsoft Entra ID application
# Get this from: https://portal.azure.com > App registrations > Your App > Certificates & secrets > Client secrets
spring.security.oauth2.client.registration.microsoft.client-secret=${OIDC_CLIENT_SECRET:your-client-secret}

# Client name (appears on login button)
spring.security.oauth2.client.registration.microsoft.client-name=Microsoft

# OAuth2 provider settings for Microsoft
# provider name must match registration name
spring.security.oauth2.client.provider.microsoft.issuer-uri=https://login.microsoftonline.com/${OIDC_TENANT_ID:common}/v2.0

# Scopes requested from the provider (openid, profile, email are recommended)
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email,User.Read

# Authorization grant type (use authorization_code for server-side applications)
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code

# Redirect URI - must be registered in your Microsoft Entra ID application
# For development:
#   http://localhost:8080/login/oauth2/code/microsoft
# For production, use your actual domain:
#   https://your-domain.com/login/oauth2/code/microsoft
spring.security.oauth2.client.registration.microsoft.redirect-uri=http://localhost:8080/login/oauth2/code/microsoft

# ============================================================================
# APPLICATION CONFIGURATION
# ============================================================================

# Security Configuration
# Use OAuth2/OIDC login for this profile.
app.security.auth-mode=${APP_SECURITY_AUTH_MODE:oauth2}

# Database configuration (inherited from application.properties)
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/picstr?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:picstr}
spring.datasource.password=${DB_PASSWORD:picstr}

# Storage configuration (inherited from application.properties)
app.storage.type=${APP_STORAGE_TYPE:s3}

# Logging
logging.level.org.springframework.security=DEBUG
