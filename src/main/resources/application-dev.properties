spring.application.name=picstr-dev

#spring.datasource.url=${DB_URL:jdbc:h2:file:./data/picstr-dev;MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
#spring.datasource.username=${DB_USER:sa}
#spring.datasource.password=${DB_PASSWORD:}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}


spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# For local development, use local file storage
app.storage.type=local

# Local File Storage Configuration
app.storage.local.base-path=${APP_STORAGE_LOCAL_BASE_PATH:./data/uploads}

# Archive purge
app.photo.archive.retention-days=${APP_PHOTO_ARCHIVE_RETENTION_DAYS:1}
app.photo.archive.purge-cron=${APP_PHOTO_ARCHIVE_PURGE_CRON:* * * * * *}

# Missing storage files detection (runs every minute in dev)
app.photo.missing-files.detection-enabled=${APP_PHOTO_MISSING_FILES_DETECTION_ENABLED:true}
app.photo.missing-files.detection-cron=${APP_PHOTO_MISSING_FILES_DETECTION_CRON:* * * * * *}

# Storage reconciliation (runs every minute in dev)
app.photo.reconcile.enabled=${APP_PHOTO_RECONCILE_ENABLED:true}
app.photo.reconcile.cron=${APP_PHOTO_RECONCILE_CRON:* * * * * *}
