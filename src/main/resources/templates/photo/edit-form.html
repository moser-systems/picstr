<!DOCTYPE html>
<html layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
>
<head><title th:text="#{label.photo.update}">Update Photo</title></head>

<div layout:fragment="content">
    <div class="page-header mt-3">
        <div class="row align-items-center">
            <div class="col">
                <h2 class="page-title" th:text="#{label.photo.update}">Update Photo</h2>
            </div>
        </div>
    </div>

    <div class="page-body">
        <div class="card">
            <div class="card-body">
                <form th:action="@{|/photos/${photoId}|}" th:object="${photoUpdateForm}" method="post">
                    <div class="mb-3">
                        <label class="form-label" for="originalFilename" th:text="#{label.photo.originalFilename}">Original filename</label>
                        <input id="originalFilename" type="text" class="form-control"
                               th:classappend="${#fields.hasErrors('originalFilename')} ? ' is-invalid'"
                               th:field="*{originalFilename}" maxlength="255" required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('originalFilename')}" th:errors="*{originalFilename}">error</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="category" th:text="#{label.category}">Category</label>
                        <select id="category" class="form-select"
                                th:classappend="${#fields.hasErrors('category')} ? ' is-invalid'"
                                th:field="*{category}" required>
                            <option value="" th:text="#{label.category.select}">Select category</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${#strings.capitalize(category.name)}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}" th:errors="*{category}">error</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="description" th:text="#{label.description}">Description</label>
                        <textarea id="description"
                                  class="form-control"
                                  th:classappend="${#fields.hasErrors('description')} ? ' is-invalid'"
                                  th:field="*{description}"
                                  maxlength="1000"
                                  rows="4"></textarea>
                        <div class="form-hint" th:text="#{msg.description.optional}">Optional, up to 1000 characters.</div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description error</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="tags" th:text="#{label.tags}">Tags</label>
                        <select id="tags" class="form-select" multiple th:field="*{tags}" autocomplete="off">
                            <option th:each="tag : ${allTags}"
                                    th:value="${tag.name}"
                                    th:text="${tag.name}">
                            </option>
                        </select>
                        <div class="form-hint" th:text="#{msg.tags.hint}">Select existing tags or type a new one and press Enter.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="latitude" th:text="#{label.latitude}">Latitude</label>
                        <input id="latitude" type="text" class="form-control" th:field="*{latitude}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="longitude" th:text="#{label.longitude}">Longitude</label>
                        <input id="longitude" type="text" class="form-control" th:field="*{longitude}">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary" th:text="#{label.btn.update}">Update</button>
                        <a class="btn btn-secondary" th:href="@{|/photos/${photoId}|}" th:text="#{label.btn.cancel}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        new TomSelect('#tags', {
            create: true,
            createOnBlur: true,
            allowEmptyOption: true,
            maxItems: 5,
            plugins: ['remove_button']
        });
    </script>
</div>
</html>
