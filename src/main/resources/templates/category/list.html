<!DOCTYPE html>
<html layout:decorate="~{layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
>
<head><title th:text="#{label.categories}">Categories</title></head>

<div layout:fragment="content">
    <div class="page-header mt-3">
        <div class="row align-items-center">
            <div class="col">
                <h2 class="page-title" th:text="#{label.categories}">Categories</h2>
            </div>
            <div class="col-auto">
                <a th:href="@{/categories/new}" class="btn btn-primary" th:title="#{label.btn.newCategory}" hx-boost="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-plus">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M12 5l0 14" />
                        <path d="M5 12l14 0" />
                    </svg>
                    <span th:text="#{label.btn.newCategory}">Add new category</span>
                </a>
            </div>
        </div>
    </div>

    <div class="page-body">
        <div class="card" th:if="${#lists.isEmpty(categories)}">
            <div class="card-body text-muted" th:text="#{msg.category.list.empty}">No categories yet.</div>
        </div>

        <div class="card" th:if="${!#lists.isEmpty(categories)}">
            <div class="table-responsive">
                <table class="table table-vcenter table-striped table-hover table-nowrap card-table">
                    <thead>
                    <tr>
                        <th class="w-1" th:text="#{label.name}">Name</th>
                        <th th:text="#{label.description}">Description</th>
                        <th class="w-1"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="category : ${categories}">
                        <td>
                            <a th:href="@{|/categories/${category.id}|}" class="text-decoration-none">
                                <span th:class="|badge bg-${category.color} text-${category.color}-fg|" th:text="${category.name}">other</span>
                            </a>
                        </td>
                        <td>
                            <th:block th:if="${category.description}">
                                <span th:with="desc=${category.description}, len=${#strings.length(category.description)}" th:title="${desc}" th:text="(${len > 100})
                                    ? ${#strings.substring(desc, 0, 100)} + '…'
                                    : ${desc}">
                                </span>
                            </th:block>
                            <th:block th:unless="${category.description}">-</th:block>
                        </td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary" th:title="#{label.btn.showPhotos}"
                               th:href="@{|/photos/by-category/${category.name}|}" hx-boost="true">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-photo">
                                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                    <path d="M15 8h.01" />
                                    <path d="M3 6a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v12a3 3 0 0 1 -3 3h-12a3 3 0 0 1 -3 -3v-12" />
                                    <path d="M3 16l5 -5c.928 -.893 2.072 -.893 3 0l5 5" />
                                    <path d="M14 14l1 -1c.928 -.893 2.072 -.893 3 0l3 3" />
                                </svg>
                                <span th:text="#{label.btn.showPhotos}">Show Photos</span>
                            </a>
                            <a class="btn btn-sm btn-outline-secondary"
                               th:href="@{|/categories/${category.id}/edit|}" th:title="#{label.btn.edit}" hx-boost="true">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-edit">
                                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                    <path d="M7 7h-1a2 2 0 0 0 -2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2 -2v-1" />
                                    <path d="M20.385 6.585a2.1 2.1 0 0 0 -2.97 -2.97l-8.415 8.385v3h3l8.385 -8.415" />
                                    <path d="M16 5l3 3" />
                                </svg>
                                <span th:text="#{label.btn.edit}">Edit</span>
                            </a>
                            <form th:action="@{|/categories/${category.id}/delete|}" method="post"
                                  class="d-inline" th:onsubmit="|return confirm('#{msg.category.confirmDelete}');|">
                                <button class="btn btn-sm btn-outline-danger" type="submit" th:title="#{label.btn.delete}">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-trash">
                                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                        <path d="M4 7l16 0" />
                                        <path d="M10 11l0 6" />
                                        <path d="M14 11l0 6" />
                                        <path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12" />
                                        <path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" />
                                    </svg>
                                    <span th:text="#{label.btn.delete}">Delete</span>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-3" th:if="${pageData}">
            <ul class="pagination m-0">
                <li class="page-item" th:classappend="${pageData.first} ? ' disabled'">
                    <a class="page-link" th:href="@{/categories(page=${pageData.number - 1},size=${pageSize})}" th:if="${!pageData.first}">&laquo;</a>
                    <span class="page-link" th:if="${pageData.first}">&laquo;</span>
                </li>
                <li class="page-item"
                    th:each="pageNumber : ${#numbers.sequence(0, pageData.totalPages - 1)}"
                    th:classappend="${pageNumber == pageData.number} ? ' active'">
                    <a class="page-link" th:href="@{/categories(page=${pageNumber},size=${pageSize})}" th:text="${pageNumber + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${pageData.last} ? ' disabled'">
                    <a class="page-link" th:href="@{/categories(page=${pageData.number + 1},size=${pageSize})}" th:if="${!pageData.last}">&raquo;</a>
                    <span class="page-link" th:if="${pageData.last}">&raquo;</span>
                </li>
            </ul>
        </div>
    </div>
</div>
</html>
