<!DOCTYPE html>
<html
        th:lang="${#locale.language}"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="#{label.app.title}">PicStr</title>
    <link rel="stylesheet" href="/vendor/tabler/css/tabler.min.css">
    <link rel="stylesheet" href="/vendor/tabler/css/tabler-themes.min.css">
    <link rel="stylesheet" href="/vendor/tom-select/css/tom-select.bootstrap5.min.css">
    <link rel="stylesheet" href="/vendor/leaflet/leaflet.css">

    <script src="/vendor/tabler/js/tabler.min.js"></script>
    <script src="/vendor/tom-select/js/tom-select.complete.min.js"></script>
    <script src="/vendor/leaflet/leaflet.js"></script>
    <script src="https://unpkg.com/hyperscript.org"></script>

    <style>
        .ts-dropdown {
            background-color: #fff;
        }
    </style>
</head>
<body class="antialiased theme-dark">
<div class="wrapper">
    <header class="navbar navbar-expand-md navbar-light sticky-top d-print-none">
        <div class="container-xl">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbar-menu" aria-controls="navbar-menu"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3">
                <a href="/" class="text-decoration-none text-reset" th:text="#{label.app.title}">PicStr</a>
            </h1>
            <ul class="navbar-nav flex-row order-md-last">
                <li class="nav-item me-2">
                    <select class="form-select form-select-sm" aria-label="language"
                            onchange="setLanguage(this.value)">
                        <option value="en" th:selected="${#locale.language == 'en'}">English</option>
                        <option value="de" th:selected="${#locale.language == 'de'}">Deutsch</option>
                    </select>
                </li>
            </ul>
            <div class="collapse navbar-collapse" id="navbar-menu">
                <ul class="navbar-nav">
                    <li class="nav-item" th:classappend="${currentUrl == '/photos'} ? ' active'">
                        <a class="nav-link" href="/photos" _="on click remove .active from .active
                                then add .active to closest <li/>">
                            <span class="nav-link-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-photo">
                                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                    <path d="M15 8h.01" />
                                    <path d="M3 6a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v12a3 3 0 0 1 -3 3h-12a3 3 0 0 1 -3 -3v-12" />
                                    <path d="M3 16l5 -5c.928 -.893 2.072 -.893 3 0l5 5" />
                                    <path d="M14 14l1 -1c.928 -.893 2.072 -.893 3 0l3 3" />
                                </svg>
                            </span>
                            <span class="nav-link-title" th:text="#{label.nav.photos}">Photos</span>
                        </a>
                    </li>
                    <li class="nav-item" th:classappend="${currentUrl == '/photos/upload'} ? ' active'">
                        <a class="nav-link" href="/photos/upload" _="on click remove .active from .active
                                then add .active to closest <li/>">
                            <span class="nav-link-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-upload">
                                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                    <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2" />
                                    <path d="M7 9l5 -5l5 5" />
                                    <path d="M12 4l0 12" />
                                </svg>
                            </span>
                            <span class="nav-link-title" th:text="#{label.nav.upload}">Upload</span>
                        </a>
                    </li>
                    <li class="nav-item" th:classappend="${currentUrl == '/photos/archive'} ? ' active'">
                        <a class="nav-link" href="/photos/archive">
                            <span class="nav-link-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-archive">
                                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                    <path d="M3 6a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2" />
                                    <path d="M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-10" />
                                    <path d="M10 12l4 0" />
                                </svg>
                            </span>
                            <span class="nav-link-title" th:text="#{label.nav.archive}">Archive</span>
                        </a>
                    </li>
                    <li class="nav-item" th:classappend="${currentUrl == '/categories'} ? ' active'">
                        <a class="nav-link" href="/categories">
                            <span class="nav-link-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-category">
                                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                    <path d="M4 4h6v6h-6l0 -6" />
                                    <path d="M14 4h6v6h-6l0 -6" />
                                    <path d="M4 14h6v6h-6l0 -6" />
                                    <path d="M14 17a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" />
                                </svg>
                            </span>
                            <span class="nav-link-title" th:text="#{label.nav.categories}">Categories</span>
                        </a>
                    </li>
                    <li class="nav-item" th:classappend="${currentUrl == '/tags'} ? ' active'">
                        <a class="nav-link" href="/tags">
                            <span class="nav-link-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-tags">
                                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                    <path d="M3 8v4.172a2 2 0 0 0 .586 1.414l5.71 5.71a2.41 2.41 0 0 0 3.408 0l3.592 -3.592a2.41 2.41 0 0 0 0 -3.408l-5.71 -5.71a2 2 0 0 0 -1.414 -.586h-4.172a2 2 0 0 0 -2 2" />
                                    <path d="M18 19l1.592 -1.592a4.82 4.82 0 0 0 0 -6.816l-4.592 -4.592" />
                                    <path d="M7 10h-.01" />
                                </svg>
                            </span>
                            <span class="nav-link-title" th:text="#{label.nav.tags}">Tags</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl">
                <div class="alert alert-success alert-dismissible" role="alert" th:if="${success}">
                    <div class="alert-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round"
                             class="icon alert-icon icon-2">
                            <path d="M5 12l5 5l10 -10" />
                        </svg>
                    </div>
                    <div>
                        <h4 class="alert-heading" th:text="#{label.alert.success}"></h4>
                        <div class="alert-description">
                            <span th:if="${#strings.startsWith(success, 'msg.')}" th:text="#{${success}}"></span>
                            <span th:unless="${#strings.startsWith(success, 'msg.')}" th:text="${success}"></span>
                        </div>
                    </div>
                    <a class="btn-close" data-bs-dismiss="alert" aria-label="close"></a>
                </div>

                <div class="alert alert-info alert-dismissible" role="alert" th:if="${info}">
                    <div class="alert-icon">
                        <!-- Download SVG icon from http://tabler.io/icons/icon/info-circle -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round"
                             class="icon alert-icon icon-2">
                            <path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" />
                            <path d="M12 9h.01" />
                            <path d="M11 12h1v4h1" />
                        </svg>
                    </div>
                    <div>
                        <h4 class="alert-heading" th:text="#{label.alert.info}"></h4>
                        <div class="alert-description">
                            <span th:if="${#strings.startsWith(info, 'msg.')}" th:text="#{${info}}"></span>
                            <span th:unless="${#strings.startsWith(info, 'msg.')}" th:text="${info}"></span>
                        </div>
                    </div>
                    <a class="btn-close" data-bs-dismiss="alert" aria-label="close"></a>
                </div>

                <div class="alert alert-warning alert-dismissible" role="alert" th:if="${warning}">
                    <div class="alert-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round"
                             class="icon alert-icon icon-2">
                            <path d="M12 9v4" />
                            <path
                                    d="M10.363 3.591l-8.106 13.534a1.914 1.914 0 0 0 1.636 2.871h16.214a1.914 1.914 0 0 0 1.636 -2.87l-8.106 -13.536a1.914 1.914 0 0 0 -3.274 0z" />
                            <path d="M12 16h.01" />
                        </svg>
                    </div>
                    <div>
                        <h4 class="alert-heading" th:text="#{label.alert.warning}"></h4>
                        <div class="alert-description">
                            <span th:if="${#strings.startsWith(warning, 'msg.')}" th:text="#{${warning}}"></span>
                            <span th:unless="${#strings.startsWith(warning, 'msg.')}" th:text="${warning}"></span>
                        </div>
                    </div>
                    <a class="btn-close" data-bs-dismiss="alert" aria-label="close"></a>
                </div>

                <div class="alert alert-danger alert-dismissible" role="alert" th:if="${error}">
                    <div class="alert-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round"
                             class="icon alert-icon icon-2">
                            <path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" />
                            <path d="M12 8v4" />
                            <path d="M12 16h.01" />
                        </svg>
                    </div>
                    <div>
                        <h4 class="alert-heading" th:text="#{label.alert.error}"></h4>
                        <div class="alert-description">
                            <span th:if="${#strings.startsWith(error, 'msg.')}" th:text="#{${error}}"></span>
                            <span th:unless="${#strings.startsWith(error, 'msg.')}" th:text="${error}"></span>
                        </div>
                    </div>
                    <a class="btn-close" data-bs-dismiss="alert" aria-label="close"></a>
                </div>

                <div layout:fragment="content"></div>
            </div>
        </div>
        <footer class="footer footer-transparent d-print-none">
            <div class="container-xl">
                <div class="row text-center align-items-center">
                    <p class="col-12 col-lg-auto mb-0 text-secondary">
                        &copy; 2026 PicStr - <a href="https://github.com/moser-systems/picstr">GitHub</a>
                    </p>
                    <div class="col-12 col-lg-auto ms-lg-auto mt-2 mt-lg-0">
                        <a class="text-secondary d-inline-flex align-items-center gap-1" href="/feed/recent.xml" title="Recent images RSS feed" aria-label="Recent images RSS feed">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-rss">
                                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                                <path d="M4 11a9 9 0 0 1 9 9" />
                                <path d="M4 4a16 16 0 0 1 16 16" />
                                <path d="M5 19a1 1 0 1 0 0 .01" />
                            </svg>
                            <span>RSS</span>
                        </a>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</div>
<script>
    function setLanguage(lang) {
        const url = new URL(window.location.href);
        url.searchParams.set('lang', lang);
        window.location.href = url.toString();
    }
</script>
</body>
</html>
