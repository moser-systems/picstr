spring.application.name=picstr

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/picstr2?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:picstr}
spring.datasource.password=${DB_PASSWORD:picstr}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.flyway.fail-on-missing-locations=true
spring.flyway.locations=classpath:db/migration/{vendor}
spring.flyway.enabled=true
spring.flyway.table=migrations

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Thumbnail backend
# Options: graphicsmagick
app.thumbnail.engine=${APP_THUMBNAIL_ENGINE:graphicsmagick}
app.thumbnail.gm.search-path=${APP_THUMBNAIL_GM_SEARCH_PATH:/usr/bin}

# Storage Backend Configuration
# Options: s3, local, ftp
app.storage.type=${APP_STORAGE_TYPE:s3}

# S3 Configuration
app.storage.s3.endpoint=${APP_STORAGE_S3_ENDPOINT:http://localhost:9000}
app.storage.s3.region=${APP_STORAGE_S3_REGION:eu-central-1}
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:picstr-images}
app.storage.s3.access-key=${APP_STORAGE_S3_ACCESS_KEY:minioadmin}
app.storage.s3.secret-key=${APP_STORAGE_S3_SECRET_KEY:minioadmin}
app.storage.s3.path-style-access-enabled=${APP_STORAGE_S3_PATH_STYLE_ACCESS_ENABLED:true}

# Local File Storage Configuration
app.storage.local.base-path=${APP_STORAGE_LOCAL_BASE_PATH:./data/uploads}

# FTP Configuration
app.storage.ftp.host=${APP_STORAGE_FTP_HOST:localhost}
app.storage.ftp.port=${APP_STORAGE_FTP_PORT:21}
app.storage.ftp.username=${APP_STORAGE_FTP_USERNAME:}
app.storage.ftp.password=${APP_STORAGE_FTP_PASSWORD:}
app.storage.ftp.base-path=${APP_STORAGE_FTP_BASE_PATH:/uploads}

# Archive purge
app.photo.archive.retention-days=${APP_PHOTO_ARCHIVE_RETENTION_DAYS:30}
app.photo.archive.purge-cron=${APP_PHOTO_ARCHIVE_PURGE_CRON:0 0 3 * * *}

# Missing storage files detection (runs daily at 4 AM)
app.photo.missing-files.detection-enabled=${APP_PHOTO_MISSING_FILES_DETECTION_ENABLED:true}
app.photo.missing-files.detection-cron=${APP_PHOTO_MISSING_FILES_DETECTION_CRON:0 0 4 * * *}

# Storage reconciliation (backfill missing photo records and thumbnails)
app.photo.reconcile.enabled=${APP_PHOTO_RECONCILE_ENABLED:true}
app.photo.reconcile.cron=${APP_PHOTO_RECONCILE_CRON:0 15 4 * * *}
